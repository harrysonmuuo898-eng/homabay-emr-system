<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outpatient Department</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../script.js" defer></script>
</head>
<body class="dept-opd" data-roles="admin,doctor,nurse">
  <header><h2>Outpatient Department</h2></header>
  <main>
    <section class="dashboard-hero">
      <div>
        <p class="eyebrow">OPD care desk</p>
        <h1>Record outpatient triage, review, referrals, and disposition</h1>
        <p>Capture patient complaints, vitals summary, clinical review, treatment, referral decisions, and charges for OPD visits.</p>
      </div>
      <img src="../images/doctor.svg" alt="Outpatient Department" class="hero-image">
    </section>

    <div class="department-dashboard">
      <section class="form-panel">
        <form class="form-grid" data-department-form="Outpatient Department">
          <label>Patient ID<input name="patientID" required></label>
          <label>Visit Cost<input name="cost" type="number" min="1" value="300" required></label>
          <label>Service
            <select name="description" required>
              <option>OPD Consultation</option>
              <option>OPD Triage</option>
              <option>OPD Review</option>
              <option>Referral from OPD</option>
              <option>Minor Treatment</option>
            </select>
          </label>
          <label>Triage Level
            <select name="triageLevel">
              <option>Routine</option>
              <option>Urgent</option>
              <option>Emergency</option>
            </select>
          </label>
          <label class="span-2">Chief Complaint<textarea name="chiefComplaint" required></textarea></label>
          <label class="span-2">Vitals Summary<textarea name="vitalsSummary"></textarea></label>
          <label class="span-2">Clinical Notes<textarea name="clinicalNotes"></textarea></label>
          <label>Disposition
            <select name="disposition">
              <option>Treat and discharge</option>
              <option>Review</option>
              <option>Refer</option>
              <option>Admit</option>
            </select>
          </label>
          <label>Reviewing Clinician<input name="reviewingClinician"></label>
          <button type="submit">Save OPD Activity</button>
        </form>
      </section>

      <aside class="activity-panel" id="deptActivity">
        <h3>Recent OPD Activity</h3>
      </aside>
    </div>
  </main>
</body>
</html>
