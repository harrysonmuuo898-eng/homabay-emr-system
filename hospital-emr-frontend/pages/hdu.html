<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDU Department</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../styles/hdu.css">
  <script src="../script.js" defer></script>
</head>
<body class="dept-hdu" data-roles="admin,doctor,nurse">
  <header><h2>HDU Department</h2></header>
  <main>
    <section class="dashboard-hero">
      <div>
        <p class="eyebrow">High dependency isolation</p>
        <h1>Contagious disease monitoring and isolation care</h1>
        <p>Track HDU admissions for contagious diseases such as Ebola, Corona, TB, and other isolation-risk conditions.</p>
      </div>
      <img src="../images/icu.svg" alt="HDU Department" class="hero-image">
    </section>

    <div class="department-dashboard">
      <section class="form-panel">
        <form class="form-grid" data-department-form="HDU">
          <label>Patient ID<input name="patientID" required></label>
          <label>Condition<select name="description" required><option>Ebola Isolation Care</option><option>Corona Isolation Care</option><option>TB Isolation Care</option><option>Other Contagious Disease</option><option>HDU Monitoring</option></select></label>
          <label>Cost<input name="cost" type="number" min="1" value="5500" required></label>
          <label>Isolation Room<input name="isolationRoom" placeholder="HDU-ISO-01"></label>
          <label>Transmission Risk<select name="transmissionRisk"><option>Contact</option><option>Droplet</option><option>Airborne</option><option>Unknown</option></select></label>
          <label>PPE Level<select name="ppeLevel"><option>Standard</option><option>Droplet</option><option>Airborne</option><option>Full barrier</option></select></label>
          <label>Clinical Status<select name="clinicalStatus"><option>Stable</option><option>Guarded</option><option>Critical</option><option>Improving</option></select></label>
          <label>Infection Control Status<select name="infectionControlStatus"><option>Isolation active</option><option>Sample sent</option><option>Confirmed case</option><option>Cleared</option></select></label>
          <label class="span-2">Monitoring Notes<textarea name="notes"></textarea></label>
          <button type="submit">Save HDU Activity</button>
        </form>
      </section>
      <aside class="activity-panel" id="deptActivity"></aside>
    </div>
  </main>
</body>
</html>
