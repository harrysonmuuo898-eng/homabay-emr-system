<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Eye Clinic</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../styles/eye.css"><script src="../script.js" defer></script></head>
<body class="dept-eye" data-roles="admin,doctor,nurse,technician"><header><h2>Eye Clinic</h2></header><main>
<section class="dashboard-hero"><div><p class="eyebrow">Ophthalmology</p><h1>Eye assessment and treatment</h1><p>Record acuity, pressure, diagnosis, procedure, medication, and follow-up.</p></div><img src="../images/eye.svg" alt="Eye Clinic" class="hero-image"></section>
<div class="department-dashboard">
  <section class="form-panel">
    <form class="form-grid" data-department-form="Eye Clinic">
<label>Patient ID<input name="patientID" required></label><label>Cost<input name="cost" type="number" min="1" value="2000" required></label>
<label>Visual Acuity<input name="visualAcuity"></label><label>Eye Pressure<input name="pressure"></label>
<label class="span-2">Diagnosis / Findings<textarea name="description" required></textarea></label><label class="span-2">Treatment / Medication<textarea name="treatment"></textarea></label>
<button type="submit">Save Eye Clinic Activity</button></form>
  </section>
  <aside class="activity-panel" id="deptActivity"></aside>
</div>
</main></body></html>
